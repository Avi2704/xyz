<svg width="520" height="360" viewBox="0 0 520 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Classifier confusion matrix">
  <rect width="520" height="360" rx="14" fill="#0a0d1a"/>
  <text x="30" y="34" fill="#f4f7ff" font-family="Inter, sans-serif" font-size="15" font-weight="700">Confusion matrix (validation)</text>
  <text x="270" y="350" fill="#8b96bd" font-family="monospace" font-size="11" text-anchor="middle">Predicted →</text>
  <text x="18" y="200" fill="#8b96bd" font-family="monospace" font-size="11" text-anchor="middle" transform="rotate(-90 18 200)">True →</text>

  <!-- column labels -->
  <g fill="#c3cbe6" font-family="monospace" font-size="11" text-anchor="middle">
    <text x="160" y="64">Tra</text><text x="240" y="64">Ecl</text><text x="320" y="64">Bln</text><text x="400" y="64">Var</text>
  </g>
  <!-- row labels -->
  <g fill="#c3cbe6" font-family="monospace" font-size="11" text-anchor="end">
    <text x="112" y="110">Tra</text><text x="112" y="190">Ecl</text><text x="112" y="270">Bln</text><text x="112" y="350" dy="-2">Var</text>
  </g>

  <!-- matrix cells: x in {120,200,280,360}, y in {80,160,240,320}, 76x76 -->
  <!-- row 1 -->
  <rect x="122" y="78" width="76" height="76" rx="6" fill="#2fe0c0" fill-opacity="0.92"/><text x="160" y="122" fill="#04121a" font-family="monospace" font-size="14" text-anchor="middle" font-weight="700">941</text>
  <rect x="202" y="78" width="76" height="76" rx="6" fill="#2fe0c0" fill-opacity="0.10"/><text x="240" y="122" fill="#c3cbe6" font-family="monospace" font-size="13" text-anchor="middle">18</text>
  <rect x="282" y="78" width="76" height="76" rx="6" fill="#2fe0c0" fill-opacity="0.08"/><text x="320" y="122" fill="#c3cbe6" font-family="monospace" font-size="13" text-anchor="middle">11</text>
  <rect x="362" y="78" width="76" height="76" rx="6" fill="#2fe0c0" fill-opacity="0.05"/><text x="400" y="122" fill="#8b96bd" font-family="monospace" font-size="13" text-anchor="middle">6</text>
  <!-- row 2 -->
  <rect x="122" y="158" width="76" height="76" rx="6" fill="#8a5bff" fill-opacity="0.10"/><text x="160" y="202" fill="#c3cbe6" font-family="monospace" font-size="13" text-anchor="middle">14</text>
  <rect x="202" y="158" width="76" height="76" rx="6" fill="#8a5bff" fill-opacity="0.90"/><text x="240" y="202" fill="#0c0420" font-family="monospace" font-size="14" text-anchor="middle" font-weight="700">802</text>
  <rect x="282" y="158" width="76" height="76" rx="6" fill="#8a5bff" fill-opacity="0.10"/><text x="320" y="202" fill="#c3cbe6" font-family="monospace" font-size="13" text-anchor="middle">21</text>
  <rect x="362" y="158" width="76" height="76" rx="6" fill="#8a5bff" fill-opacity="0.05"/><text x="400" y="202" fill="#8b96bd" font-family="monospace" font-size="13" text-anchor="middle">9</text>
  <!-- row 3 -->
  <rect x="122" y="238" width="76" height="76" rx="6" fill="#5b8cff" fill-opacity="0.08"/><text x="160" y="282" fill="#8b96bd" font-family="monospace" font-size="13" text-anchor="middle">9</text>
  <rect x="202" y="238" width="76" height="76" rx="6" fill="#5b8cff" fill-opacity="0.12"/><text x="240" y="282" fill="#c3cbe6" font-family="monospace" font-size="13" text-anchor="middle">16</text>
  <rect x="282" y="238" width="76" height="76" rx="6" fill="#5b8cff" fill-opacity="0.88"/><text x="320" y="282" fill="#03101f" font-family="monospace" font-size="14" text-anchor="middle" font-weight="700">688</text>
  <rect x="362" y="238" width="76" height="76" rx="6" fill="#5b8cff" fill-opacity="0.05"/><text x="400" y="282" fill="#8b96bd" font-family="monospace" font-size="13" text-anchor="middle">7</text>
  <!-- row 4 -->
  <rect x="122" y="318" width="76" height="34" rx="6" fill="#ffce5b" fill-opacity="0.05"/><text x="160" y="340" fill="#8b96bd" font-family="monospace" font-size="12" text-anchor="middle">5</text>
  <rect x="202" y="318" width="76" height="34" rx="6" fill="#ffce5b" fill-opacity="0.05"/><text x="240" y="340" fill="#8b96bd" font-family="monospace" font-size="12" text-anchor="middle">8</text>
  <rect x="282" y="318" width="76" height="34" rx="6" fill="#ffce5b" fill-opacity="0.05"/><text x="320" y="340" fill="#8b96bd" font-family="monospace" font-size="12" text-anchor="middle">12</text>
  <rect x="362" y="318" width="76" height="34" rx="6" fill="#ffce5b" fill-opacity="0.85"/><text x="400" y="340" fill="#1c1403" font-family="monospace" font-size="13" text-anchor="middle" font-weight="700">615</text>
</svg>
