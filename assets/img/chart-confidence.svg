<svg width="520" height="320" viewBox="0 0 520 320" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Classification probability distribution">
  <rect width="520" height="320" rx="14" fill="#0a0d1a"/>
  <text x="30" y="36" fill="#f4f7ff" font-family="Inter, sans-serif" font-size="15" font-weight="700">Class probability</text>
  <line x1="160" y1="60" x2="160" y2="280" stroke="#2a3457" stroke-width="1.5"/>

  <!-- Planet transit -->
  <text x="148" y="86" fill="#c3cbe6" font-family="monospace" font-size="12" text-anchor="end">Transit</text>
  <rect x="160" y="74" width="300" height="18" rx="9" fill="#161c33"/>
  <rect x="160" y="74" width="276" height="18" rx="9" fill="#2fe0c0"/>
  <text x="470" y="88" fill="#2fe0c0" font-family="monospace" font-size="12">0.92</text>

  <!-- Eclipsing binary -->
  <text x="148" y="136" fill="#c3cbe6" font-family="monospace" font-size="12" text-anchor="end">Eclipse</text>
  <rect x="160" y="124" width="300" height="18" rx="9" fill="#161c33"/>
  <rect x="160" y="124" width="42" height="18" rx="9" fill="#8a5bff"/>
  <text x="470" y="138" fill="#d2b9ff" font-family="monospace" font-size="12">0.05</text>

  <!-- Blend -->
  <text x="148" y="186" fill="#c3cbe6" font-family="monospace" font-size="12" text-anchor="end">Blend</text>
  <rect x="160" y="174" width="300" height="18" rx="9" fill="#161c33"/>
  <rect x="160" y="174" width="18" height="18" rx="9" fill="#5b8cff"/>
  <text x="470" y="188" fill="#aac4ff" font-family="monospace" font-size="12">0.02</text>

  <!-- Variable / other -->
  <text x="148" y="236" fill="#c3cbe6" font-family="monospace" font-size="12" text-anchor="end">Variable</text>
  <rect x="160" y="224" width="300" height="18" rx="9" fill="#161c33"/>
  <rect x="160" y="224" width="9" height="18" rx="9" fill="#ffce5b"/>
  <text x="470" y="238" fill="#ffe2a0" font-family="monospace" font-size="12">0.01</text>

  <text x="260" y="300" fill="#5d678c" font-family="monospace" font-size="11" text-anchor="middle">softmax output · CNN classifier</text>
</svg>
