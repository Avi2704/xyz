<svg width="640" height="520" viewBox="0 0 640 520" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="hStar" cx="0.5" cy="0.5" r="0.5">
      <stop stop-color="#fff7e0"/><stop offset="0.45" stop-color="#ffd66b"/><stop offset="0.8" stop-color="#ff9f43"/><stop offset="1" stop-color="#ff7a2f" stop-opacity="0.4"/>
    </radialGradient>
    <radialGradient id="hGlow" cx="0.5" cy="0.5" r="0.5">
      <stop stop-color="#ffce5b" stop-opacity="0.45"/><stop offset="1" stop-color="#ffce5b" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="hLine" x1="0" y1="0" x2="640" y2="0">
      <stop stop-color="#5b8cff"/><stop offset="0.5" stop-color="#8a5bff"/><stop offset="1" stop-color="#2fe0c0"/>
    </linearGradient>
    <linearGradient id="hPanel" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#161c33"/><stop offset="1" stop-color="#0c1124"/>
    </linearGradient>
    <radialGradient id="hPlanet" cx="0.35" cy="0.35" r="0.75">
      <stop stop-color="#3a4775"/><stop offset="1" stop-color="#0a0e1f"/>
    </radialGradient>
  </defs>

  <!-- backdrop stars -->
  <g fill="#ffffff">
    <circle cx="60" cy="70" r="1.4" opacity="0.7"/><circle cx="540" cy="60" r="1.8" opacity="0.8"/>
    <circle cx="600" cy="180" r="1.2" opacity="0.6"/><circle cx="40" cy="260" r="1.5" opacity="0.7"/>
    <circle cx="150" cy="40" r="1" opacity="0.5"/><circle cx="500" cy="220" r="1.2" opacity="0.6"/>
    <circle cx="610" cy="320" r="1.4" opacity="0.7"/><circle cx="90" cy="180" r="1" opacity="0.5"/>
  </g>

  <!-- star with glow -->
  <circle cx="300" cy="150" r="150" fill="url(#hGlow)"/>
  <circle cx="300" cy="150" r="92" fill="url(#hStar)"/>
  <!-- starspots -->
  <ellipse cx="270" cy="130" rx="14" ry="9" fill="#e9883b" opacity="0.45"/>
  <ellipse cx="330" cy="180" rx="10" ry="7" fill="#e9883b" opacity="0.4"/>

  <!-- transiting planet -->
  <circle cx="360" cy="150" r="22" fill="url(#hPlanet)" stroke="#5b8cff" stroke-width="1.5"/>
  <ellipse cx="360" cy="150" rx="34" ry="9" stroke="#8a5bff" stroke-width="1.5" fill="none" opacity="0.7" transform="rotate(-18 360 150)"/>

  <!-- orbit path -->
  <ellipse cx="300" cy="150" rx="200" ry="50" stroke="#5b8cff" stroke-width="1" fill="none" opacity="0.3" stroke-dasharray="4 6"/>

  <!-- light curve panel -->
  <rect x="40" y="320" width="560" height="170" rx="18" fill="url(#hPanel)" stroke="#2a3457" stroke-width="1.5"/>
  <text x="62" y="350" fill="#8b96bd" font-family="monospace" font-size="13">FLUX (normalised)</text>
  <text x="500" y="478" fill="#8b96bd" font-family="monospace" font-size="13">TIME (BJD)</text>

  <!-- grid -->
  <g stroke="#243056" stroke-width="1">
    <line x1="62" y1="370" x2="578" y2="370"/><line x1="62" y1="410" x2="578" y2="410"/><line x1="62" y1="450" x2="578" y2="450"/>
  </g>

  <!-- light curve with two transit dips -->
  <path d="M62 388 L130 386 L150 387 L165 385 L175 432 L195 433 L205 386 L300 388 L320 387 L340 385 L348 430 L368 431 L378 386 L470 388 L500 386 L530 387 L578 386"
        fill="none" stroke="url(#hLine)" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- transit markers -->
  <circle cx="190" cy="432" r="4" fill="#2fe0c0"/><circle cx="358" cy="431" r="4" fill="#2fe0c0"/>
  <rect x="160" y="370" width="50" height="70" rx="6" fill="#2fe0c0" opacity="0.08"/>
  <rect x="328" y="370" width="50" height="70" rx="6" fill="#2fe0c0" opacity="0.08"/>
  <text x="178" y="365" fill="#2fe0c0" font-family="monospace" font-size="11" text-anchor="middle">transit</text>
</svg>
